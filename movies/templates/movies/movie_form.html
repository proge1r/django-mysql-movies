{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Movie</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 0;">
    <div class="form-container">
        <h2 style="margin-top: 0; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px;">Movie Details</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Save Changes</button>
        </form>
        <br>
        <a href="{% url 'movie_list' %}" style="color: #888; text-decoration: none; display: block; text-align: center; font-size: 14px;">Cancel and go back</a>
    </div>
</body>
</html>
