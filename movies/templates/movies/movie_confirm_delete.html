<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Movie</title>
</head>
<body>
    <h2>Are you sure you want to delete "{{ movie.title }}"?</h2>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="background-color: red; color: white; padding: 5px 10px; border: none; cursor: pointer;">Confirm Delete</button>
    </form>
    <br>
    <a href="{% url 'movie_detail' movie.id %}">Cancel</a>
</body>
</html>
