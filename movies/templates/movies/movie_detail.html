{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ movie.title }} - KINOJUMP</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="detail-container">
        <a href="{% url 'movie_list' %}" class="back-link">← Back to catalog</a>
        <div class="detail-card">
            <div class="detail-poster">
                {% if movie.image %}
                    <img src="{{ movie.image.url }}" alt="{{ movie.title }}">
                {% else %}
                    <div class="no-poster" style="aspect-ratio: 2/3; border-radius: 8px;">No Poster</div>
                {% endif %}
            </div>
            <div class="detail-info">
                <h1 style="margin: 0 0 10px 0; font-size: 32px;">{{ movie.title }}</h1>
                <div class="detail-rating">Rating: ★ {{ movie.rating }} / 5</div>
                <p style="color: #888; margin: 5px 0;"><strong>Release Date:</strong> {{ movie.release_date }}</p>
                <h3 style="margin-top: 30px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">Description</h3>
                <p style="color: #ccc; line-height: 1.6; margin: 0;">{{ movie.description }}</p>
                <div class="btn-group">
                    <a href="{% url 'movie_edit' movie.id %}" class="btn-edit">Edit info</a>
                    <a href="{% url 'movie_delete' movie.id %}" class="btn-delete">Delete movie</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
